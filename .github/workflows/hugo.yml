# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          HUGO_PARAMS_ANALYTICS_GOOGLE_SITEVERIFICATIONTAG: "eiNjrmwL16SFaMFhFzZ2vvT3rS45eukZ5ZrspfVc73w"
          HUGO_GOOGLEANALYTICS: "G-JT3L9W7RN9"
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Build for py0.cn
        run: |
          hugo \
            --minify \
            --destination public_server

      - name: Upload py0.cn artifact
        uses: actions/upload-artifact@v4
        with:
          name: public_server
          path: public_server/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy_server:
    runs-on: [self-hosted, linux]
    needs: build
    steps:
      # 1. 在下载前先清理旧的残留（防止旧文件干扰）
      - name: Clean up old artifacts
        run: sudo rm -rf ./dist_server
        
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: public_server
          path: ./dist_server
      - name: Copy files to /opt/stacks/blog
        run: |
          sudo rm -rf /opt/stacks/blog/*
          sudo cp -r ./dist_server/* /opt/stacks/blog/
      # 2. 部署完成后清理临时文件（释放服务器磁盘空间）
      - name: Post cleanup
        run: sudo rm -rf ./dist_server
